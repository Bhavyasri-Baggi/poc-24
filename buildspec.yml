version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 485626261954.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Build started on `date`
      - docker build -t ecs-demo .
      - docker tag ecs-demo:latest 485626261954.dkr.ecr.us-east-1.amazonaws.com/ecs-demo:latest

  post_build:
    commands:
      - echo Pushing Docker image...
      - docker push 485626261954.dkr.ecr.us-east-1.amazonaws.com/ecs-demo:latest
      - echo Writing image definitions file...
      - printf '[{"name":"ecs-demo-container","imageUri":"%s"}]' 485626261954.dkr.ecr.us-east-1.amazonaws.com/ecs-demo:latest > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
